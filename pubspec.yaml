name: sgm_school_app
description: SGM International School - Official App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  fl_chart: ^0.66.2
  intl: ^0.20.2
  percent_indicator: ^4.2.3
  table_calendar: ^3.0.9
  google_fonts: ^6.1.0
  flutter_local_notifications: ^18.0.0
  font_awesome_flutter: ^11.0.0
  shared_preferences: ^2.5.5
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_native_splash:
  color: "#2D0A03"
  android_12:
    color: "#2D0A03"

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/sgm_logo.jpg"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
